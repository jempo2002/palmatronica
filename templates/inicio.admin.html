<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inicio Administrador</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/inicio.admin.css') }}">
  <script defer src="{{ url_for('static', filename='js/inicio.admin.js') }}"></script>
</head>
<body>
  <div class="main-container">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo Palmatronica" class="logo">

    <section class="cards">
      <article class="card" id="new-order-card" data-url="{{ url_for('crear_orden') }}">
        <h2>Crear Orden de Servicio</h2>

        <div class="id-search">
          <input id="client-id" type="text" placeholder="Número de identificación" />
          <button id="find-client" class="btn" type="button">Buscar</button>
        </div>

        <div class="dropdown">
          <button type="button" data-type="computador">Computador</button>
          <button type="button" data-type="celular">Celular</button>
        </div>
      </article>

      <article class="card" id="history-card" data-url="{{ url_for('historial_servicios') }}">
        <h2>Historial de Servicios</h2>
      </article>
    </section>
  </div>
</body>
</html>
