<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio Administrador</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/inicio.admin.css') }}">
  <script src="{{ url_for('static', filename='js/inicio.admin.js') }}" defer></script>
</head>
<body>
    <div class="main-container">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="logo">
      <div class="cards">
        <div class="card" id="register-card" data-url="{{ url_for('registrarse') }}">
          <h2>Registrar Usuario</h2>
        </div>
        <div class="card" id="new-order-card">
          <h2>Crear Orden de Servicio</h2>
          <div class="id-search">
            <input type="text" id="client-id" placeholder="Número de CC" />
            <p id="client-error" class="error-text" role="alert" aria-live="polite" hidden>Usuario no existe.</p>
          </div>
          <div class="dropdown">
            <button data-type="consola" data-url="{{ url_for('nueva_orden_consola') }}">Consola</button>
            <button data-type="celular" data-url="{{ url_for('nueva_orden') }}">Celular</button>
          </div>
        </div>
        <div class="card" id="history-card" data-url="{{ url_for('historial') }}">
          <h2>Historial de Servicios</h2>
        </div>
      </div>
      <a href="{{ url_for('logout') }}" class="btn">Cerrar sesión</a>
    </div>
  </body>
</html>
