<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Servicios</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/historial.css') }}">
  <script src="{{ url_for('static', filename='js/historial.js') }}" defer></script>
</head>
<body>
  <div class="page">
    <header class="page__header">
      <a href="{{ url_for('inicio_admin') }}" class="back-btn" aria-label="Volver">&#8592;</a>
      <h1 class="title">Historial de Servicios</h1>
    </header>

    <section class="filters">
      <div class="filters__group">
        <input type="text" id="search-cliente" placeholder="Buscar por nombre o CC" class="filter-input">
        <select id="filter-year" class="filter-select">
          <option value="">Todos los años</option>
        </select>
        <select id="filter-month" class="filter-select">
          <option value="">Todos los meses</option>
          <option value="1">Enero</option>
          <option value="2">Febrero</option>
          <option value="3">Marzo</option>
          <option value="4">Abril</option>
          <option value="5">Mayo</option>
          <option value="6">Junio</option>
          <option value="7">Julio</option>
          <option value="8">Agosto</option>
          <option value="9">Septiembre</option>
          <option value="10">Octubre</option>
          <option value="11">Noviembre</option>
          <option value="12">Diciembre</option>
        </select>
        <select id="filter-tipo" class="filter-select">
          <option value="">Todos los tipos</option>
          <option value="celular">Celular</option>
          <option value="consola">Consola</option>
        </select>
      </div>
    </section>

    <section class="results">
      <div id="loading" class="loading" hidden>Cargando...</div>
      <div id="no-results" class="no-results" hidden>No se encontraron resultados</div>
      <div id="ordenes-container" class="ordenes-grid"></div>
    </section>

    <!-- Modal de confirmación de eliminación -->
    <div id="modal-overlay" class="modal-overlay" hidden></div>
    <div id="delete-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="delete-title" hidden>
      <div class="modal__header">
        <h2 id="delete-title">Confirmar eliminación</h2>
      </div>
      <div class="modal__body">
        <p id="delete-message">¿Seguro que deseas eliminar la orden <strong id="delete-orden-id"></strong>? Esta acción no se puede deshacer.</p>
      </div>
      <div class="modal__footer">
        <button type="button" id="btn-cancel" class="btn btn--ghost">Cancelar</button>
        <button type="button" id="btn-confirm" class="btn btn--danger">Eliminar</button>
      </div>
    </div>
  </div>
</body>
</html>
